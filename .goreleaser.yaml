version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: claude-switch
    main: ./cmd/claude-switch
    binary: claude-switch
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

  - id: claude-switch-server
    main: ./cmd/claude-switch-server
    binary: claude-switch-server
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: claude-switch
    ids: [claude-switch]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "claude-switch_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: claude-switch-server
    ids: [claude-switch-server]
    formats: [tar.gz]
    name_template: "claude-switch-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Linux native packages (.deb / .rpm).
#
# Generated for amd64 + arm64 from the same `claude-switch` build that
# powers the tarballs and the Homebrew tap. Each package installs the
# binary at /usr/bin/claude-switch and ships a systemd **user** unit
# at /usr/lib/systemd/user/claude-switch.service so the wrapper runs
# under the installing user's uid (it needs read access to that user's
# ~/.claude transcripts and stored credentials — a system unit running
# as root would not see them).
#
# After installation, end users enable the unit themselves:
#
#     systemctl --user enable --now claude-switch
#
# (And `loginctl enable-linger $USER` if they want it to keep running
# while logged out.)
#
# The packages are uploaded as GitHub Release assets — there is no
# hosted APT/YUM repo yet, so the install path is `apt install ./*.deb`
# / `dnf install ./*.rpm` against the downloaded file.
nfpms:
  - id: claude-switch
    package_name: claude-switch
    ids: [claude-switch]
    vendor: jleal52
    homepage: "https://github.com/jleal52/claude-switch"
    maintainer: "jleal52 <noreply@github.com>"
    description: "Wrapper that drives multiple Claude CLI sessions remotely over WebSocket."
    license: Proprietary
    formats: [deb, rpm]
    bindir: /usr/bin
    section: utils
    contents:
      - src: packaging/systemd/claude-switch.service
        dst: /usr/lib/systemd/user/claude-switch.service
        type: config|noreplace

# Homebrew tap for macOS (Intel + Apple Silicon).
#
# Prerequisites (one-time setup):
#   1. Create an empty public repo: github.com/jleal52/homebrew-tap
#   2. Generate a fine-grained PAT with `Contents: write` scoped to that
#      repo only (https://github.com/settings/tokens?type=beta).
#   3. Add it as the secret HOMEBREW_TAP_TOKEN in
#      github.com/jleal52/claude-switch (Settings → Secrets → Actions).
#
# Goreleaser then renders Formula/claude-switch.rb from the darwin
# archives on every tagged release, and users install with:
#
#     brew install jleal52/tap/claude-switch
brews:
  - name: claude-switch
    ids: [claude-switch]
    repository:
      owner: jleal52
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(formula): bump claude-switch to {{ .Tag }}"
    homepage: "https://github.com/jleal52/claude-switch"
    description: "Wrapper that drives multiple Claude CLI sessions remotely over WebSocket."
    skip_upload: auto    # skip for prereleases / snapshots
    install: |
      bin.install "claude-switch"
    # `brew services start claude-switch` registers a per-user LaunchAgent
    # (no sudo → ~/Library/LaunchAgents/), so the wrapper runs as the
    # installing user with access to their ~/.claude transcripts and
    # credentials. PATH is extended with ~/.local/bin so the official
    # Anthropic installer's `claude` binary is found.
    service: |
      run [opt_bin/"claude-switch"]
      keep_alive true
      working_dir Dir.home
      log_path var/"log/claude-switch.log"
      error_log_path var/"log/claude-switch.log"
      environment_variables PATH: "#{Dir.home}/.local/bin:#{std_service_path_env}"
    test: |
      output = shell_output("#{bin}/claude-switch pair 2>&1", 2)
      assert_match "pair requires a server base URL", output

# Scoop bucket for Windows.
#
# Mirror of the Homebrew tap pattern. Goreleaser writes a manifest
# (`bucket/claude-switch.json`) to github.com/jleal52/scoop-bucket on
# every tagged release, so users install with:
#
#     scoop bucket add jleal52 https://github.com/jleal52/scoop-bucket
#     scoop install claude-switch
#
# Prerequisites (one-time, same shape as the brew tap setup):
#   1. Create an empty public repo: github.com/jleal52/scoop-bucket
#   2. Generate a fine-grained PAT with `Contents: write` scoped to
#      that repo only.
#   3. Add it as the secret SCOOP_BUCKET_TOKEN in
#      github.com/jleal52/claude-switch (Settings → Secrets → Actions).
#
# Without the secret the next `release.yml` run will fail at the scoop
# step.
scoops:
  - name: claude-switch
    ids: [claude-switch]
    repository:
      owner: jleal52
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(scoop): bump claude-switch to {{ .Tag }}"
    homepage: "https://github.com/jleal52/claude-switch"
    description: "Wrapper that drives multiple Claude CLI sessions remotely over WebSocket."
    license: Proprietary
    skip_upload: auto    # skip for prereleases / snapshots

release:
  github:
    owner: jleal52
    name: claude-switch

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: claude-switch
    main: ./cmd/claude-switch
    binary: claude-switch
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

  - id: claude-switch-server
    main: ./cmd/claude-switch-server
    binary: claude-switch-server
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: claude-switch
    ids: [claude-switch]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "claude-switch_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: claude-switch-server
    ids: [claude-switch-server]
    formats: [tar.gz]
    name_template: "claude-switch-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: jleal52
    name: claude-switch

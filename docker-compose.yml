# Deployment of claude-switch-server.
#
# Joins ONE existing Docker network where both Traefik and MongoDB live
# (e.g. `app-net`). If your setup has Traefik and Mongo on SEPARATE networks,
# add a docker-compose.override.yml that adds the second network — see the
# README for an example.
#
# Build & deploy:
#   docker compose up -d --build

services:
  claude-switch-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: claude-switch-server
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017}
      MONGO_DB: ${MONGO_DB:-claude_switch}

      SERVER_BASE_URL: ${SERVER_BASE_URL:-https://claude-switch.dns.nom.es}

      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}

      # 32+ random bytes (base64) used to sign session cookies and CSRF tokens.
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}

      LOG_LEVEL: ${LOG_LEVEL:-info}

    networks:
      - shared

    labels:
      - traefik.enable=true
      - traefik.docker.network=${SHARED_NETWORK:-app-net}
      - traefik.http.routers.claude-switch.rule=Host(`${SERVER_HOST:-claude-switch.dns.nom.es}`)
      - traefik.http.routers.claude-switch.entrypoints=websecure
      - traefik.http.routers.claude-switch.tls=true
      - traefik.http.routers.claude-switch.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.claude-switch.loadbalancer.server.port=8080

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK:-app-net}
